<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATOS NETCASH</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

:root {
  --navy:   #003f7f;
  --blue:   #004481;
  --mid:    #1464A0;
  --sky:    #2DCCCD;
  --sky2:   #1da8a8;
  --ink:    #0d1f35;
  --muted:  #5c6f82;
  --line:   #d6e2ef;
  --bg:     #f0f4f9;
  --white:  #ffffff;
  --green:  #00a86b;
  --red:    #d63030;
  --yellow: #f5a623;
  --shadow: 0 2px 16px rgba(0,68,129,.10);
  --shadow-lg: 0 8px 40px rgba(0,68,129,.16);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── HEADER ─────────────────────────────────────── */
header {
  width: 100%;
  background: var(--blue);
  padding: 0 40px;
  height: 64px;
  display: flex;
  align-items: center;
  gap: 0;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 0 rgba(255,255,255,.08), 0 4px 20px rgba(0,0,0,.25);
}

.logo {
  font-size: 26px;
  font-weight: 700;
  font-style: italic;
  color: white;
  letter-spacing: -0.5px;
  padding-right: 24px;
  border-right: 1px solid rgba(255,255,255,.2);
  line-height: 1;
}

.header-title {
  padding-left: 24px;
  color: rgba(255,255,255,.85);
  font-size: 14px;
  font-weight: 400;
  letter-spacing: .2px;
}

.header-badge {
  margin-left: auto;
  background: rgba(45,204,205,.15);
  border: 1px solid rgba(45,204,205,.3);
  color: var(--sky);
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: .5px;
  text-transform: uppercase;
}

/* ── MAIN ────────────────────────────────────────── */
main {
  width: 100%;
  max-width: 780px;
  padding: 44px 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── CARDS ───────────────────────────────────────── */
.card {
  background: var(--white);
  border-radius: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid rgba(0,68,129,.06);
}

.card-head {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
}

.card-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.icon-blue  { background: #e8f0fb; }
.icon-teal  { background: #e0f7f7; }
.icon-green { background: #e0f5ed; }

.card-head-text h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.3;
}
.card-head-text p {
  font-size: 12.5px;
  color: var(--muted);
  margin-top: 2px;
}

.card-body { padding: 24px 28px; }

/* ── UPLOAD ──────────────────────────────────────── */
.drop-zone {
  border: 2px dashed var(--line);
  border-radius: 12px;
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
.drop-zone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}
.drop-zone:hover,
.drop-zone.over {
  border-color: var(--sky);
  background: #f0fafa;
}
.drop-zone.loaded {
  border-color: var(--green);
  border-style: solid;
  background: #f0fdf7;
}

.drop-icon {
  font-size: 36px;
  margin-bottom: 12px;
  display: block;
  transition: transform .3s;
}
.drop-zone:hover .drop-icon { transform: translateY(-3px); }
.drop-zone.loaded .drop-icon { transform: none; }

.drop-label {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.6;
}
.drop-label strong { color: var(--mid); }

.file-pill {
  display: none;
  margin-top: 14px;
  background: white;
  border: 1px solid var(--green);
  color: var(--green);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12.5px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

/* ── FIELDS ──────────────────────────────────────── */
.field-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.field-group.single  { grid-template-columns: 1fr; }
.field-group.thirds  { grid-template-columns: 1fr 1fr 1fr; }
.field-group + .field-group { margin-top: 16px; }

.field {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .7px;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.badge-req {
  background: var(--navy);
  color: white;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 700;
  letter-spacing: .3px;
}

.badge-auto {
  background: var(--green);
  color: white;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 700;
  letter-spacing: .3px;
}

input[type="text"] {
  padding: 10px 14px;
  border: 1.5px solid var(--line);
  border-radius: 8px;
  font-size: 13.5px;
  font-family: 'DM Sans', sans-serif;
  color: var(--ink);
  background: white;
  transition: border-color .2s, box-shadow .2s;
  outline: none;
}
input[type="text"]:focus {
  border-color: var(--sky);
  box-shadow: 0 0 0 3px rgba(45,204,205,.14);
}
input[type="text"].featured {
  border-color: var(--blue);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  letter-spacing: .5px;
  background: #f7f9ff;
}
input[type="text"].featured:focus {
  border-color: var(--sky);
  background: white;
}
input[type="text"][readonly] {
  background: var(--bg);
  color: var(--muted);
  border-color: var(--line);
  cursor: default;
}

/* ── PAGES SUMMARY ───────────────────────────────── */
.pages-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.page-item {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 14px;
  background: var(--bg);
}
.page-num {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .6px;
  color: var(--muted);
  margin-bottom: 6px;
}
.page-title {
  font-size: 12.5px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 6px;
  line-height: 1.35;
}
.page-fields {
  font-size: 11.5px;
  color: var(--muted);
  line-height: 1.6;
}

/* ── SUBMIT ──────────────────────────────────────── */
.btn-wrap { padding: 0 28px 28px; }

.submit-btn {
  width: 100%;
  padding: 16px;
  background: var(--blue);
  color: white;
  border: none;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background .2s, transform .1s, box-shadow .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  box-shadow: 0 4px 14px rgba(0,68,129,.25);
  letter-spacing: .2px;
}
.submit-btn:hover {
  background: var(--mid);
  box-shadow: 0 6px 20px rgba(0,68,129,.3);
  transform: translateY(-1px);
}
.submit-btn:active { transform: scale(.985); }
.submit-btn:disabled {
  background: var(--muted);
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

.spinner {
  width: 18px; height: 18px;
  border: 2.5px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .65s linear infinite;
  display: none;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PROGRESS BAR ────────────────────────────────── */
.progress-wrap {
  padding: 0 28px;
  margin-bottom: 4px;
  display: none;
}
.progress-bar {
  height: 4px;
  background: var(--line);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--sky));
  border-radius: 2px;
  width: 0%;
  transition: width .4s ease;
}
.progress-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
  text-align: center;
  font-family: 'DM Mono', monospace;
}
.card-body .progress-wrap { padding-left: 0; padding-right: 0; }
.card-body .btn-wrap { padding: 18px 0 0; }

/* ── TOAST ───────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink);
  color: white;
  padding: 13px 22px;
  border-radius: 10px;
  font-size: 13.5px;
  font-weight: 500;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  z-index: 999;
  box-shadow: 0 8px 24px rgba(0,0,0,.25);
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error   { background: var(--red); }

/* ── RESPONSIVE ──────────────────────────────────── */
@media (max-width: 600px) {
  header { padding: 0 20px; }
  main { padding: 24px 12px 60px; }
  .card-head, .card-body, .btn-wrap { padding-left: 18px; padding-right: 18px; }
  .field-group { grid-template-columns: 1fr; }
  .field-group.thirds { grid-template-columns: 1fr 1fr; }
  .pages-grid { grid-template-columns: 1fr; }
  .header-badge { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo" style="font-size:16px;font-style:normal;letter-spacing:0.06em;">DATOS NETCASH</div>
</header>

<main>

  <!-- PDF + Código Central + generar -->
  <div class="card">
    <div class="card-body">
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="pdf-input" accept=".pdf">
        <span class="drop-icon" id="drop-icon">📁</span>
        <div class="drop-label" id="drop-label">
          <strong>Haz clic</strong> o arrastra aquí el PDF<br>
          <span style="font-size:12px;opacity:.7">Solo archivos .pdf</span>
        </div>
        <div class="file-pill" id="file-pill"></div>
      </div>
      <div class="field-group single" style="margin-top:20px">
        <div class="field">
          <label>Código Central</label>
          <input
            type="text"
            id="codigo_central"
            class="featured"
            placeholder="Hasta 8 caracteres"
            autocomplete="off"
            spellcheck="false"
            maxlength="8"
          >
        </div>
      </div>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-label" id="progress-label">Iniciando…</div>
      </div>
      <div class="btn-wrap">
        <button class="submit-btn" id="submit-btn" onclick="generatePDF()">
          <div class="spinner" id="spinner"></div>
          <span id="btn-text">⬇️&nbsp; Generar PDF llenado</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Datos fijos -->
  <div class="card">
    <div class="card-head">
      <div class="card-icon icon-teal">⚙️</div>
      <div class="card-head-text">
        <h3>1. Datos del ejecutivo</h3>
        <p>Precargados automáticamente — solo lectura</p>
      </div>
    </div>
    <div class="card-body">
      <div class="field-group">
        <div class="field">
          <label>Nombre del ejecutivo <span class="badge-auto">AUTO</span></label>
          <input type="text" value="VICTOR QUEVEDO" readonly>
        </div>
        <div class="field">
          <label>Registro <span class="badge-auto">AUTO</span></label>
          <input type="text" value="P024101" readonly>
        </div>
        <div class="field">
          <label>Nombre de la oficina <span class="badge-auto">AUTO</span></label>
          <input type="text" value="TARAPOTO" readonly>
        </div>
        <div class="field">
          <label>Código de la oficina <span class="badge-auto">AUTO</span></label>
          <input type="text" value="0310" readonly>
        </div>
      </div>
      <div class="field-group single" style="margin-top:14px">
        <div class="field">
          <label>Correo electrónico <span class="badge-auto">AUTO</span></label>
          <input type="text" value="VICTOR.QUEVEDO@BBVA.COM" readonly>
        </div>
      </div>
      <div class="field-group thirds" style="margin-top:14px">
        <div class="field">
          <label>Localidad <span class="badge-auto">AUTO</span></label>
          <input type="text" value="TARAPOTO" readonly>
        </div>
        <div class="field">
          <label>Fecha <span class="badge-auto">HOY</span></label>
          <input type="text" id="fecha-display" readonly>
        </div>
      </div>
    </div>
  </div>

</main>

<div class="toast" id="toast"></div>

<!-- pdf-lib from CDN -->
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
// ── Config (edit here if data changes) ──────────────────────────────────────
const CONFIG = {
  OFICINA_NOMBRE:   'TARAPOTO',
  OFICINA_CODIGO:   '0310',
  EJECUTIVO_NOMBRE: 'VICTOR QUEVEDO',
  REGISTRO:         'P024101',
  CORREO:           'VICTOR.QUEVEDO@BBVA.COM',
  LOCALIDAD:        'TARAPOTO',
};

/** Milímetros (medición típica del PDF) → puntos pdf-lib (origen abajo-izquierda). */
function mmToPt(mm) {
  return (mm * 72) / 25.4;
}

// ── Today's date ─────────────────────────────────────────────────────────────
const MESES = ['enero','febrero','marzo','abril','mayo','junio',
               'julio','agosto','septiembre','octubre','noviembre','diciembre'];

function getToday() {
  const d = new Date();
  return {
    dia:  String(d.getDate()),
    mes:  MESES[d.getMonth()],
    anio: String(d.getFullYear()),
  };
}

/** Fecha del día actual en la UI (al cargar, al elegir PDF y al generar). */
function refreshFechaDesdeHoy() {
  const t = getToday();
  const el = document.getElementById('fecha-display');
  if (el) el.value = `${t.dia} de ${t.mes} de ${t.anio}`;
}

(function() { refreshFechaDesdeHoy(); })();

// ── Drag & drop / file picker ─────────────────────────────────────────────────
let pdfBytes = null;
let pdfFileName = '';

const dropZone  = document.getElementById('drop-zone');
const pdfInput  = document.getElementById('pdf-input');
const dropIcon  = document.getElementById('drop-icon');
const dropLabel = document.getElementById('drop-label');
const filePill  = document.getElementById('file-pill');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
pdfInput.addEventListener('change', () => {
  if (pdfInput.files[0]) handleFile(pdfInput.files[0]);
});

function handleFile(file) {
  if (!file.name.toLowerCase().endsWith('.pdf')) {
    showToast('Solo se aceptan archivos PDF', 'error'); return;
  }
  pdfFileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    pdfBytes = new Uint8Array(e.target.result);
    dropZone.classList.add('loaded');
    dropIcon.textContent = '✅';
    dropLabel.innerHTML = '<strong style="color:var(--green)">Archivo cargado</strong>';
    filePill.textContent = file.name;
    filePill.style.display = 'inline-block';
    refreshFechaDesdeHoy();
  };
  reader.readAsArrayBuffer(file);
}

// ── Progress helper ───────────────────────────────────────────────────────────
function setProgress(pct, label) {
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = label;
}

function showProgress(visible) {
  document.getElementById('progress-wrap').style.display = visible ? 'block' : 'none';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3200);
}

// ── Main: generate PDF ────────────────────────────────────────────────────────
async function generatePDF() {
  const codigoCentral = document.getElementById('codigo_central').value.trim();

  if (!pdfBytes) {
    showToast('Primero selecciona el PDF del formulario', 'error'); return;
  }
  if (!codigoCentral) {
    document.getElementById('codigo_central').focus();
    showToast('Ingresa el Código Central del cliente', 'error'); return;
  }
  if (codigoCentral.length > 8) {
    document.getElementById('codigo_central').focus();
    showToast('El Código Central admite como máximo 8 caracteres', 'error'); return;
  }

  const btn = document.getElementById('submit-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Procesando…';
  showProgress(true);

  // Small delay to let UI update before heavy work
  await new Promise(r => setTimeout(r, 30));

  try {
    refreshFechaDesdeHoy();
    setProgress(10, 'Leyendo PDF…');
    const pdfDoc   = await PDFLib.PDFDocument.load(pdfBytes, { ignoreEncryption: true });
    const pages    = pdfDoc.getPages();
    const fontReg  = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
    const fontBold = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
    const today    = getToday();

    // draw helper
    function draw(page, text, x, y, size, bold) {
      page.drawText(String(text), {
        x, y,
        size: size || 9,
        font: bold ? fontBold : fontReg,
        color: PDFLib.rgb(0, 0, 0),
      });
    }

    /** Centra texto en [slotLeft, slotLeft+slotWidth] (puntos PDF, origen abajo-izquierda). */
    function drawCentered(page, text, slotLeft, slotWidth, y, size, bold) {
      const font = bold ? fontBold : fontReg;
      const s = size || 9;
      const str = String(text);
      const tw = font.widthOfTextAtSize(str, s);
      const x = slotLeft + Math.max(0, (slotWidth - tw) / 2);
      page.drawText(str, {
        x, y,
        size: s,
        font,
        color: PDFLib.rgb(0, 0, 0),
      });
    }

    /** Centro horizontal = mitad de la raya impresa [rayaIzq, rayaDer] (mismas unidades que drawText). */
    function drawCenteredOnLine(page, text, rayaIzq, rayaDer, y, size, bold) {
      const w = Math.max(0, rayaDer - rayaIzq);
      drawCentered(page, text, rayaIzq, w, y, size, bold);
    }

    const mesMayus = today.mes.toUpperCase();
    // Mismo cuerpo y peso que el resto de datos autollenados en el contrato (p. ej. bloque «Para Uso del Banco», pág. 2).
    const FILL_FONT = 10;
    /** Septiembre y noviembre: 8.4 pt en toda la línea (ciudad…año); el resto (incl. diciembre) a 10 pt. */
    const MESES_LARGOS_PDF = ['SEPTIEMBRE', 'NOVIEMBRE'];
    /** Ciudad, día, mes y año en PDF: 8.4 pt si el mes es uno de los largos; si no, 10 pt (todo alineado). */
    const tamLineaFechaPdf = MESES_LARGOS_PDF.includes(mesMayus) ? 8.4 : FILL_FONT;
    // Pequeño desplazamiento vertical para descendentes sobre el subrayado (calibrado para 10 pt).
    const yFechaLift = 1.5;
    // Pág. 13: separación baseline ↔ raya (más puntos = texto más arriba / más lejos de la raya).
    const yPagina13Arriba = 2.2;
    const yPagina13Abajo  = 2;

    // ── PAGE 2 (index 1) ─────────────────────────────────────────────────
    // Row1 label bottom=129.21 → val y = 842-(129.21+4)-10 = 698.79
    // Row2 label bottom=202.21 → val y = 842-(202.21+4)-10 = 625.79
    setProgress(30, 'Llenando página 2…');
    const p2 = pages[1];

    draw(p2, codigoCentral,           44,  698.79, 10, true);
    draw(p2, CONFIG.OFICINA_NOMBRE,   197, 698.79, 10, true);
    draw(p2, CONFIG.OFICINA_CODIGO,   433, 698.79, 10, true);
    draw(p2, CONFIG.EJECUTIVO_NOMBRE, 44,  625.79, 10, true);
    draw(p2, CONFIG.REGISTRO,         256, 625.79, 10, true);
    draw(p2, CONFIG.CORREO,           371, 625.79,  9, true);

    // ── PDF página 15 de 16 (índice 14) — contrato / firmas
    // TOP localidad (firma cliente): label top=107.4 → y = 842-107.4-9 = 725.6
    // BANCO section: label bottom=513.1 → val y = 842-(513.1+4)-10 = 314.9  (bold)
    // BOTTOM localidad: label top=631.4 → y = 842-631.4-9 = 201.6
    setProgress(55, 'Llenando página 13 del contrato…');
    const p15 = pages[14];

    // Pág. 15/16 arriba — ciudad: subrayado X 88.8 mm … 123.8 mm (centrar TARAPOTO).
    const p15TopY = 842 - 107.4 - FILL_FONT + yFechaLift + yPagina13Arriba;
    const p15TopCiudadIzq = mmToPt(88.8);
    const p15TopCiudadDer = mmToPt(123.8);
    drawCenteredOnLine(p15, CONFIG.LOCALIDAD, p15TopCiudadIzq, p15TopCiudadDer, p15TopY, tamLineaFechaPdf, true);
    const p15TopDiaIzq = mmToPt(129.1);
    const p15TopDiaDer = mmToPt(141.1);
    drawCenteredOnLine(p15, today.dia, p15TopDiaIzq, p15TopDiaDer, p15TopY, tamLineaFechaPdf, true);
    const p15TopMesIzq = mmToPt(148.2);
    const p15TopMesDer = mmToPt(175.7);
    drawCenteredOnLine(p15, mesMayus, p15TopMesIzq, p15TopMesDer, p15TopY, tamLineaFechaPdf, true);
    const p15TopAnioIzq = mmToPt(182.7);
    const p15TopAnioDer = mmToPt(199);
    drawCenteredOnLine(p15, today.anio, p15TopAnioIzq, p15TopAnioDer, p15TopY, tamLineaFechaPdf, true);

    // Para Uso Exclusivo del Banco — bold
    draw(p15, CONFIG.EJECUTIVO_NOMBRE, 39,  314.9, 10, true);
    draw(p15, CONFIG.OFICINA_NOMBRE,   266, 314.9, 10, true);
    draw(p15, CONFIG.REGISTRO,         464, 314.9, 10, true);

    const p15BotY = 842 - 631.4 - FILL_FONT + yFechaLift + yPagina13Abajo;
    const p15BotCiudadIzq = mmToPt(95.6);
    const p15BotCiudadDer = mmToPt(130.9);
    drawCenteredOnLine(p15, CONFIG.LOCALIDAD, p15BotCiudadIzq, p15BotCiudadDer, p15BotY, tamLineaFechaPdf, true);
    const p15BotDiaIzq = mmToPt(134.8);
    const p15BotDiaDer = mmToPt(144.3);
    drawCenteredOnLine(p15, today.dia, p15BotDiaIzq, p15BotDiaDer, p15BotY, tamLineaFechaPdf, true);
    const p15BotMesIzq = mmToPt(150.6);
    const p15BotMesDer = mmToPt(175.7);
    drawCenteredOnLine(p15, mesMayus, p15BotMesIzq, p15BotMesDer, p15BotY, tamLineaFechaPdf, true);
    const p15BotAnioIzq = mmToPt(182);
    const p15BotAnioDer = mmToPt(198.3);
    drawCenteredOnLine(p15, today.anio, p15BotAnioIzq, p15BotAnioDer, p15BotY, tamLineaFechaPdf, true);

    // ── PDF página 16 de 16 (índice 15) — Anexo / localidad y fecha (mm → pt).
    setProgress(75, 'Llenando página 14 del contrato…');
    const p16 = pages[15];

    const p16Y = 842 - 133.4 - FILL_FONT + yFechaLift;
    const p16CiudadIzq = mmToPt(106.5);
    const p16CiudadDer = mmToPt(137.9);
    drawCenteredOnLine(p16, CONFIG.LOCALIDAD, p16CiudadIzq, p16CiudadDer, p16Y, tamLineaFechaPdf, true);
    const p16DiaIzq = mmToPt(142.2);
    const p16DiaDer = mmToPt(151);
    drawCenteredOnLine(p16, today.dia, p16DiaIzq, p16DiaDer, p16Y, tamLineaFechaPdf, true);
    const p16MesIzq = mmToPt(157.3);
    const p16MesDer = mmToPt(177.1);
    drawCenteredOnLine(p16, mesMayus, p16MesIzq, p16MesDer, p16Y, tamLineaFechaPdf, true);
    const p16AnioIzq = mmToPt(183.8);
    const p16AnioDer = mmToPt(198.3);
    drawCenteredOnLine(p16, today.anio, p16AnioIzq, p16AnioDer, p16Y, tamLineaFechaPdf, true);

    // ── Save & download ──────────────────────────────────────────────────
    setProgress(90, 'Guardando PDF…');
    const outBytes  = await pdfDoc.save();
    const blob      = new Blob([outBytes], { type: 'application/pdf' });
    const url       = URL.createObjectURL(blob);
    const baseName  = pdfFileName.replace(/\.pdf$/i, '');
    const fileName  = `${baseName}_LLENADO_${today.dia}${today.mes.substring(0,3).toUpperCase()}${today.anio}.pdf`;

    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    a.click();
    URL.revokeObjectURL(url);

    setProgress(100, '¡Listo!');
    showToast('✅ PDF generado y descargado correctamente', 'success');

  } catch (err) {
    console.error(err);
    showToast('Error procesando el PDF: ' + err.message, 'error');
  } finally {
    setTimeout(() => {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = '⬇️\u00a0 Generar PDF llenado';
      showProgress(false);
    }, 1200);
  }
}

// ── Enter key on código central triggers generate ─────────────────────────────
document.getElementById('codigo_central').addEventListener('keydown', e => {
  if (e.key === 'Enter') generatePDF();
});
</script>
</body>
</html>
